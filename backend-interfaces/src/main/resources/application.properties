spring.application.name=tesis

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.profiles.active=dev

# Configuracion de OpenAPI (Swagger)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Logging Filter
logging.filter.enabled=true

# Patron de logging que incluye el traceId (%X{traceId})
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] [${spring.application.name}] - %msg%n

server.port=8081

# Configuracion de la base de datos (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/springdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Puedes mantener esta propiedad o ajustarla segun necesites
spring.jpa.hibernate.ddl-auto=update

# Configuracion level Logging
logging.level.org.springframework.web=debug
logging.level.org.hibernate=error